site_name: Structural Divergence Indexer
site_description: A CLI tool for measuring structural drift in a codebase over time.
site_url: https://geoffgodwin.github.io/structural-divergence-indexer/
repo_url: https://github.com/GeoffGodwin/structural-divergence-indexer
repo_name: GeoffGodwin/structural-divergence-indexer
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Concepts: concepts.md
  - CLI Reference: cli.md
  - Design:
      - Overview: design/index.md
      - v0 (DESIGN.md): design/v0.md
      - v1 (DESIGN_v1.md): design/v1.md
  - Milestones: milestones.md
  - CI Integration: ci-integration.md
  - Maintenance:
      - Release Process: maintenance/releases.md
      - Versioning: maintenance/versioning.md
  - Changelog: changelog.md
