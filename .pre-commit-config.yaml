default_install_hook_types: [pre-push]
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [src/, tests/]
        pass_filenames: false
        stages: [pre-push]
      - id: ruff-format
        args: [--check, src/, tests/]
        pass_filenames: false
        stages: [pre-push]
