name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag matches pyproject version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Parse tag and pyproject version
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pyproject=$PYPROJECT_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match pyproject version $PYPROJECT_VERSION"
            exit 1
          fi

  gate:
    name: Full test gate
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev,all]"

      - name: Configure git identity for integration tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check
        run: mypy src/sdi/

      - name: Unit tests with coverage
        run: pytest tests/unit/ --cov=sdi

      - name: Integration tests with coverage append
        run: pytest tests/integration/ -v --cov=sdi --cov-append

      - name: Enforce combined coverage threshold
        run: coverage report --fail-under=80

  build:
    name: Build sdist + wheel
    needs: [validate, gate]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          python - <<'PY' "$VERSION" >> "$GITHUB_OUTPUT"
          import re, sys, pathlib
          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text()
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          body = m.group(1).strip() if m else f"Release {version}. See CHANGELOG.md for details."
          # GH Actions multi-line output
          print("body<<EOF")
          print(body)
          print("EOF")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  # PyPI publishing intentionally omitted until the v0.x → v1.0 battle-test is complete.
  # When ready, add a publish job that uses PyPI Trusted Publishing (OIDC) — no long-lived tokens.
