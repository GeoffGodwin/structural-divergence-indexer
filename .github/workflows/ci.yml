name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "milestone-**"
  pull_request:
    branches:
      - main

jobs:
  changelog-hygiene:
    name: Changelog Hygiene
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check that src/ changes are accompanied by a CHANGELOG entry
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base_sha...$head_sha")

          src_changed=$(printf '%s\n' "$changed" | grep '^src/' || true)
          changelog_changed=$(printf '%s\n' "$changed" | grep '^CHANGELOG\.md$' || true)

          if [ -n "$src_changed" ] && [ -z "$changelog_changed" ]; then
            echo "::error::This PR changes files under src/ but does not update CHANGELOG.md."
            echo "Add an entry under [Unreleased] in CHANGELOG.md, or override this check at review time if the change is genuinely user-invisible."
            echo
            echo "src/ files changed in this PR:"
            printf '%s\n' "$src_changed" | sed 's/^/  /'
            exit 1
          fi

          echo "Changelog hygiene OK."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install all dependencies
        run: pip install -e ".[dev,all]"

      - name: Mypy
        run: mypy src/sdi/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all dependencies
        run: pip install -e ".[dev,all]"

      - name: Configure git identity for integration tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: Unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=sdi \
            --cov-report=term-missing

      - name: Integration tests with coverage append
        run: |
          pytest tests/integration/ -v \
            --cov=sdi \
            --cov-append \
            --cov-report=term-missing

      - name: Enforce combined coverage threshold
        run: coverage report --fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage
